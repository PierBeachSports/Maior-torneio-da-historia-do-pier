<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    
    <!-- 🔥 ESSENCIAL PARA RESPONSIVO -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contagem Regressiva</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <p class="data">28 A 31 DE MAIO:</p>

        <br><br><br><br>

        <h1>
            <span>#</span> O <b>MAIOR</b> TORNEIO <br>
            DA <b>HISTÓRIA</b> DO PIER
        </h1>

        <br><br><br><br><br>

        <!-- 🔥 CONTADOR -->
        <div class="contador">

            <div class="bloco">
                <span class="label">Dias</span>
                <span id="dias">00</span>
            </div>

            <span class="separador">:</span>

            <div class="bloco">
                <span class="label">Horas</span>
                <span id="horas">00</span>
            </div>

            <span class="separador">:</span>

            <div class="bloco">
                <span class="label">Minutos</span>
                <span id="minutos">00</span>
            </div>

    <span class="separador">:</span>

            <div class="bloco">
                <span class="label">Segundos</span>
                <span id="segundos">00</span>
            </div>

    <!-- 🌊 ONDAS -->
    <div class="ondas">
        <img src="ondas.png" alt="ondas coloridas">
    </div>

    <script src="script.js"></script>
</body>
</html>
